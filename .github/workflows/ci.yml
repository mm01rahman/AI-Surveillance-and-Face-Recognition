name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      PYTHONPATH: packages/recognition-sdk/src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy

      - name: Run Ruff
        run: ruff check .

      - name: Run Mypy
        run: mypy . --ignore-missing-imports

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-typecheck

    env:
      PYTHONPATH: packages/recognition-sdk/src

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-mock pytest-benchmark

      - name: Run Contracts & Unit Tests
        run: pytest -ra tests/contracts tests/unit

      - name: Run Integration Tests
        run: pytest -ra tests/integration