name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: packages/recognition-sdk/src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "packages/recognition-sdk/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/recognition-sdk/requirements-dev.txt
          # Assuming ruff and mypy are now in requirements-dev.txt, 
          # you don't need to pip install them explicitly here anymore.

      - name: Run Ruff (Linter)
        # Removed --fix so it fails loudly if the repo contains bad code
        run: ruff check . 

      - name: Run Mypy (Type Checker)
        # Scoped to src to prevent duplicate namespace collisions
        run: mypy packages/recognition-sdk/src --ignore-missing-imports 

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      PYTHONPATH: packages/recognition-sdk/src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          # Fixed the cache path to match what you are installing
          cache-dependency-path: "packages/recognition-sdk/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/recognition-sdk/requirements-dev.txt

      - name: Run Contracts & Unit Tests
        run: pytest tests/contracts/ tests/unit/

      - name: Run Integration Tests
        run: pytest tests/integration/