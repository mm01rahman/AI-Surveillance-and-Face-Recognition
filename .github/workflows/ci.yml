name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: packages/recognition-sdk/src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          # Points directly to the SDK's requirements file
          cache-dependency-path: "packages/recognition-sdk/requirements-dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/recognition-sdk/requirements-dev.txt
          pip install ruff mypy

      - name: Run Ruff (Linter)
        run: ruff check .

      - name: Run Mypy (Type Checker)
        run: mypy . --ignore-missing-imports 

  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    env:
      PYTHONPATH: packages/recognition-sdk/src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          # Points directly to the SDK's requirements file
          cache-dependency-path: "packages/recognition-sdk/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r packages/recognition-sdk/requirements-dev.txt
          pip install pytest pytest-mock pytest-benchmark

      - name: Run Contracts & Unit Tests
        run: pytest tests/contracts/ tests/unit/

      - name: Run Integration Tests
        run: pytest tests/integration/