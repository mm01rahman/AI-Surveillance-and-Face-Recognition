[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "recognition-sdk"
version = "0.1.0"
description = "Face recognition SDK components for detection, alignment, embedding, matching, and enrollment."
requires-python = ">=3.10"
dependencies = [
    "numpy",
    "opencv-python",
    "onnxruntime",
    "faiss-cpu",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
